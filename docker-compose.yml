services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.1}"]
    depends_on:
      ollama:
        condition: service_healthy

  app:
    build:
      context: ./sw_control_hierachy
      dockerfile: Dockerfile
    container_name: safework-controller
    ports:
      - "5000:5000"
    environment:
      Ollama__Address: http://ollama:11434
      Ollama__Model: ${OLLAMA_MODEL:-llama3.1}
      Server__Port: "5000"
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
