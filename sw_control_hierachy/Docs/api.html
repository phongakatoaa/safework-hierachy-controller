<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Safework Hierarchy Controller — API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; }
    .topbar { display: none !important; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const spec = {
      "openapi": "3.0.3",
      "info": {
        "title": "Safework Hierarchy Controller",
        "description": "Assesses workplace hazards from the Safework CALog database and recommends corrective controls based on the OSHA Hierarchy of Controls framework. Powered by a locally-running Ollama LLM.",
        "version": "2.0.0"
      },
      "servers": [
        {
          "url": "http://localhost:5000",
          "description": "Local development server"
        }
      ],
      "paths": {
        "/assess/calog/{id}": {
          "post": {
            "summary": "Assess a CALog hazard entry",
            "description": "Fetches a corrective-action log entry from the Safework database, sends its details to the Ollama LLM, and returns both the CALog data and the recommended control from the OSHA Hierarchy of Controls.",
            "operationId": "assessCalog",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": { "type": "integer" },
                "description": "The CALog ID to assess."
              }
            ],
            "responses": {
              "200": {
                "description": "CALog entry assessed successfully.",
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/AssessCalogResponse" },
                    "examples": {
                      "example": {
                        "summary": "Successful assessment",
                        "value": {
                          "calog": {
                            "calogId": 1234,
                            "description": "Loose guardrail on mezzanine level",
                            "currentStatus": "Open",
                            "isNearMiss": true,
                            "risk": {
                              "cariskId": 3,
                              "risk": "High",
                              "colorCode": "#FF0000"
                            },
                            "currentControl": {
                              "cacontrolId": 6,
                              "control": "Personal Protective Equipment",
                              "description": "Use of PPE to reduce exposure to hazards."
                            }
                          },
                          "recommendation": {
                            "control_id": 3,
                            "control_name": "Engineering Controls",
                            "reason": "The loose guardrail should be re-secured or replaced with a fixed barrier to eliminate the fall hazard at the mezzanine level."
                          }
                        }
                      }
                    }
                  }
                }
              },
              "404": {
                "description": "CALog entry not found.",
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                    "examples": {
                      "not_found": { "value": { "error": "CALog 999 not found." } }
                    }
                  }
                }
              },
              "502": {
                "description": "Ollama returned a response that could not be parsed as JSON.",
                "content": {
                  "application/problem+json": {
                    "schema": { "$ref": "#/components/schemas/ProblemDetails" }
                  }
                }
              },
              "503": {
                "description": "Could not communicate with the Ollama server.",
                "content": {
                  "application/problem+json": {
                    "schema": { "$ref": "#/components/schemas/ProblemDetails" }
                  }
                }
              }
            }
          }
        }
      },
      "components": {
        "schemas": {
          "AssessCalogResponse": {
            "type": "object",
            "properties": {
              "calog": { "$ref": "#/components/schemas/CalogSummary" },
              "recommendation": { "$ref": "#/components/schemas/Recommendation" }
            }
          },
          "CalogSummary": {
            "type": "object",
            "properties": {
              "calogId": { "type": "integer", "example": 1234 },
              "description": { "type": "string", "nullable": true, "example": "Loose guardrail on mezzanine level" },
              "currentStatus": { "type": "string", "nullable": true, "example": "Open" },
              "isNearMiss": { "type": "boolean", "nullable": true },
              "risk": { "nullable": true, "$ref": "#/components/schemas/RiskInfo" },
              "currentControl": { "nullable": true, "$ref": "#/components/schemas/ControlInfo" }
            }
          },
          "RiskInfo": {
            "type": "object",
            "properties": {
              "cariskId": { "type": "integer", "example": 3 },
              "risk": { "type": "string", "example": "High" },
              "colorCode": { "type": "string", "example": "#FF0000" }
            }
          },
          "ControlInfo": {
            "type": "object",
            "properties": {
              "cacontrolId": { "type": "integer", "example": 6 },
              "control": { "type": "string", "example": "Personal Protective Equipment" },
              "description": { "type": "string", "example": "Use of PPE to reduce exposure to hazards." }
            }
          },
          "Recommendation": {
            "type": "object",
            "properties": {
              "control_id": { "type": "integer", "description": "ID of the recommended control.", "example": 3 },
              "control_name": { "type": "string", "description": "Name of the recommended control.", "example": "Engineering Controls" },
              "reason": { "type": "string", "description": "Practical explanation for the recommendation, tailored to the specific hazard.", "example": "The loose guardrail should be re-secured or replaced with a fixed barrier to eliminate the fall hazard." }
            }
          },
          "ErrorResponse": {
            "type": "object",
            "properties": {
              "error": { "type": "string", "example": "CALog 999 not found." }
            }
          },
          "ProblemDetails": {
            "type": "object",
            "properties": {
              "type": { "type": "string" },
              "title": { "type": "string" },
              "status": { "type": "integer" },
              "detail": { "type": "string" }
            }
          }
        }
      }
    };

    SwaggerUIBundle({
      spec: spec,
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      deepLinking: true,
      tryItOutEnabled: true
    });
  </script>
</body>
</html>
